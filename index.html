<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Business Ideas — Agent Adventure 🍪</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root { --bg:#fef6fb; --text:#5d3a5c; --accent:#f48fb1; --card:#fff0f5; --border:rgba(100,70,120,0.12); --meta:#888; --nav-bg:rgba(100,70,120,0.5); }
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Inter',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }
.container { max-width:1400px; margin:0 auto; padding:3rem 2.5rem 5rem; }
h1 { font-size:3.5rem; font-weight:800; color:var(--accent); margin-bottom:0.5rem; letter-spacing:-1px; }
.subtitle { color:var(--meta); font-size:1.3rem; margin-bottom:2.5rem; }
.grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(450px,1fr)); gap:2rem; }
.card { background:var(--card); border:1px solid var(--border); border-radius:24px; padding:0; overflow:hidden; box-shadow:0 4px 20px rgba(100,70,120,0.08); transition:transform 0.2s, box-shadow 0.2s; }
.card:hover { transform:translateY(-3px); box-shadow:0 8px 30px rgba(100,70,120,0.12); }
.card-body { padding:2rem; }
.card h3 { font-size:1.8rem; margin-bottom:0.6rem; }
.card .owner { color:var(--meta); font-size:1.1rem; margin-bottom:0.8rem; }
.card .desc { font-size:1.15rem; line-height:1.7; margin-bottom:0.8rem; }
.card .price { font-weight:700; color:var(--accent); font-size:1.4rem; }
.card .tags { display:flex; gap:0.5rem; flex-wrap:wrap; margin-top:0.8rem; }
.card .tag { font-size:0.85rem; padding:0.3rem 0.7rem; border-radius:10px; background:rgba(244,143,177,0.1); color:var(--meta); }
#loading { text-align:center; padding:4rem 0; color:var(--meta); font-size:1.2rem; }
.footer { text-align:center; margin-top:3rem; color:var(--meta); font-size:0.9rem; }

/* Slideshow */
.slideshow { position:relative; width:100%; aspect-ratio:3/2; background:#f0e4ee; overflow:hidden; border-radius:24px 24px 0 0; }
.slideshow img { position:absolute; top:0; left:0; width:100%; height:100%; object-fit:cover; opacity:0; transition:opacity 0.5s ease-in-out; }
.slideshow img.active { opacity:1; }
.slideshow .nav { position:absolute; top:50%; transform:translateY(-50%); background:var(--nav-bg); color:#fff; border:none; width:44px; height:44px; border-radius:50%; cursor:pointer; font-size:1.5rem; display:flex; align-items:center; justify-content:center; opacity:0; transition:opacity 0.3s; z-index:2; }
.slideshow:hover .nav { opacity:1; }
.slideshow .nav:hover { background:rgba(100,70,120,0.8); }
.slideshow .prev { left:10px; }
.slideshow .next { right:10px; }
.slideshow .dots { position:absolute; bottom:12px; left:50%; transform:translateX(-50%); display:flex; gap:6px; z-index:2; }
.slideshow .dot { width:10px; height:10px; border-radius:50%; background:rgba(255,255,255,0.5); cursor:pointer; transition:background 0.2s; }
.slideshow .dot.active { background:#fff; }
.slideshow .counter { position:absolute; top:12px; right:12px; background:rgba(0,0,0,0.5); color:#fff; font-size:0.85rem; padding:4px 12px; border-radius:12px; z-index:2; }
</style>>
</head>
<body>
<div class="container">
  <h1>🍪 Business Ideas</h1>
  <p class="subtitle">Agent Adventure Summer 2026 — Cerivitas</p>
  <div id="loading">Memuat ide bisnis...</div>
  <div class="grid" id="grid"></div>
  <p class="footer">Dibuat dengan ❤️ oleh peserta Business Coach Workshop</p>
</div>
<script>
const RAW = 'https://raw.githubusercontent.com/sarinursita/cerivitas-businesskids/main/';
const API = 'https://api.github.com/repos/sarinursita/cerivitas-businesskids/contents/';

function getPrefix(name) {
  return name.replace(/\.md$/,'').toLowerCase();
}

function matchImages(images, prefix) {
  return images.filter(img => img.startsWith(prefix + '-') || img.startsWith(prefix + '.'));
}

function renderSlideshow(images) {
  if (!images.length) return '';
  const id = 'ss-' + Math.random().toString(36).slice(2,8);
  let html = `<div class="slideshow" id="${id}">`;
  images.forEach((img, i) => {
    html += `<img src="${RAW}images/${img}" class="${i===0?'active':''}" data-index="${i}" alt="slide ${i+1}">`;
  });
  if (images.length > 1) {
    html += `<button class="nav prev" onclick="slidePrev('${id}')">‹</button>`;
    html += `<button class="nav next" onclick="slideNext('${id}')">›</button>`;
    html += `<div class="dots">`;
    images.forEach((_, i) => {
      html += `<span class="dot ${i===0?'active':''}" onclick="slideTo('${id}',${i})"></span>`;
    });
    html += `</div>`;
    html += `<span class="counter">1/${images.length}</span>`;
  }
  html += `</div>`;
  return html;
}

window.slideTo = function(id, idx) {
  const ss = document.getElementById(id);
  if (!ss) return;
  const imgs = ss.querySelectorAll('img');
  const dots = ss.querySelectorAll('.dot');
  const counter = ss.querySelector('.counter');
  imgs.forEach((img, i) => {
    img.classList.toggle('active', i === idx);
  });
  if (dots.length) dots.forEach((d, i) => d.classList.toggle('active', i === idx));
  if (counter) counter.textContent = (idx+1) + '/' + imgs.length;
};

window.slideNext = function(id) {
  const ss = document.getElementById(id);
  if (!ss) return;
  const active = ss.querySelector('img.active');
  const idx = parseInt(active.dataset.index);
  const next = (idx + 1) % ss.querySelectorAll('img').length;
  slideTo(id, next);
};

window.slidePrev = function(id) {
  const ss = document.getElementById(id);
  if (!ss) return;
  const active = ss.querySelector('img.active');
  const idx = parseInt(active.dataset.index);
  const imgs = ss.querySelectorAll('img');
  const prev = (idx - 1 + imgs.length) % imgs.length;
  slideTo(id, prev);
};

async function load() {
  // Fetch markdown files & image list in parallel
  const [respItems, respImages] = await Promise.all([
    fetch(API),
    fetch(API + 'images/').catch(() => null)
  ]);
  const items = await respItems.json();
  const mdFiles = items.filter(i => i.type==='file' && i.name.endsWith('.md') && i.name!=='README.md');

  let allImages = [];
  if (respImages && respImages.ok) {
    const imgItems = await respImages.json();
    allImages = imgItems.filter(i => i.type==='file').map(i => i.name);
  }

  const grid = document.getElementById('grid');
  for (const f of mdFiles) {
    try {
      const md = await (await fetch(RAW + f.name)).text();
      const name = (md.match(/^# (.+)$/m)||[])[1] || f.name.replace('.md','');
      const owner = (md.match(/\*\*Pemilik:\*\*\s*(.+)/)||[])[1] || '';
      const product = (md.match(/\*\*Produk:\*\*\s*(.+)/)||[])[1] || '';
      const price = (md.match(/\*\*Harga:\*\*\s*(.+)/)||[])[1] || '';
      const target = (md.match(/\*\*Target:\*\*\s*(.+)/)||[])[1] || '';
      const usp = (md.match(/\*\*USP:\*\*\s*(.+)/)||[])[1] || '';
      const tags = ((md.match(/\*\*Tags:\*\*\s*(.+)/)||[])[1]||'').split(',').map(s=>s.trim()).filter(Boolean);

      const prefix = getPrefix(f.name);
      const matched = matchImages(allImages, prefix);
      const slideshowHtml = renderSlideshow(matched);

      const card = document.createElement('div');
      card.className = 'card';
      card.style.cursor = 'pointer';
      card.onclick = function() { window.location.href = prefix + '.html'; };
      card.innerHTML = `
        ${slideshowHtml}
        <div class="card-body">
          <h3>${name}</h3>
          ${owner ? `<p class="owner">✍️ ${owner}</p>` : ''}
          ${product ? `<p class="desc">${product}</p>` : ''}
          ${price ? `<p class="price">💰 ${price}</p>` : ''}
          ${target ? `<p style="font-size:0.9rem;color:var(--meta)">🎯 ${target}</p>` : ''}
          ${usp ? `<p style="font-size:0.9rem;color:var(--meta);font-style:italic">✨ ${usp}</p>` : ''}
          ${tags.length ? `<div class="tags">${tags.map(t=>`<span class="tag">${t}</span>`).join('')}</div>` : ''}
        </div>
      `;
      grid.appendChild(card);
    } catch(e) { console.error(e); }
  }
  document.getElementById('loading').style.display = 'none';
  if (!grid.children.length) grid.innerHTML = '<p style="text-align:center;color:var(--meta)">Belum ada ide bisnis. Ikut Business Coach Workshop dulu! 🍪</p>';
}
load();
</script>
</body>
</html>
